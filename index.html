<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Advanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Padauk', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .language-toggle {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .lang-btn:hover {
            border-color: #667eea;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #764ba2;
        }

        .geolocation-btn {
            padding: 12px 25px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .geolocation-btn:hover {
            background: #229954;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Current Weather */
        .weather-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 30px;
        }

        .weather-left {
            text-align: center;
        }

        .city-name {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .city-date {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 100px;
            margin: 20px 0;
        }

        .temperature {
            font-size: 56px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .weather-description {
            font-size: 18px;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .weather-right {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 22px;
            font-weight: 700;
            color: #333;
        }

        /* Air Quality */
        .air-quality-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .aq-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .aq-index {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .aq-status {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .aq-components {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .aq-component {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .aq-component-name {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .aq-component-value {
            font-size: 18px;
            font-weight: 700;
        }

        .aqi-excellent { background: linear-gradient(135deg, #00c853 0%, #00a84f 100%); }
        .aqi-good { background: linear-gradient(135deg, #76ff03 0%, #64dd17 100%); color: #333; }
        .aqi-moderate { background: linear-gradient(135deg, #ffeb3b 0%, #fbc02d 100%); color: #333; }
        .aqi-poor { background: linear-gradient(135deg, #ff6f00 0%, #e65100 100%); }
        .aqi-very-poor { background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%); }

        /* Forecast */
        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s;
        }

        .forecast-item:hover {
            transform: translateY(-5px);
        }

        .forecast-time {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 36px;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .forecast-desc {
            font-size: 12px;
            color: #999;
            text-transform: capitalize;
        }

        /* Alerts */
        .alert {
            display: none;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .alert-warning {
            background: #ffeaa7;
            color: #d63031;
            border-left: 4px solid #fdcb6e;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            display: none;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .weather-info {
            display: none;
        }

        .weather-info.show {
            display: block;
        }

        .weather-alerts {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .weather-alerts.show {
            display: block;
        }

        .alert-item {
            margin-bottom: 10px;
            font-size: 14px;
            color: #856404;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .weather-main {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .temperature {
                font-size: 42px;
            }

            .city-name {
                font-size: 24px;
            }

            .weather-right {
                grid-template-columns: 1fr;
            }

            .forecast-container {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Language Toggle -->
        <div class="header">
            <div class="title" id="appTitle">Weather App</div>
            <div class="language-toggle">
                <button class="lang-btn active" onclick="changeLanguage('en')">English</button>
                <button class="lang-btn" onclick="changeLanguage('my')">မြန်မာ</button>
            </div>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button onclick="searchWeather()" id="searchBtn">Search</button>
            <button class="geolocation-btn" onclick="getGeolocation()" id="geoBtn">📍 My Location</button>
        </div>

        <!-- Alerts -->
        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-warning" id="warningAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span id="loadingText">Loading...</span>
        </div>

        <!-- Main Content -->
        <div class="weather-info" id="weatherInfo">
            <!-- Weather Alerts -->
            <div class="weather-alerts" id="weatherAlerts"></div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('current')" id="currentTab">
                    <span id="currentTabLabel">Current</span>
                </button>
                <button class="tab-btn" onclick="switchTab('forecast')" id="forecastTab">
                    <span id="forecastTabLabel">5-Day Forecast</span>
                </button>
                <button class="tab-btn" onclick="switchTab('airquality')" id="airqualityTab">
                    <span id="airqualityTabLabel">Air Quality</span>
                </button>
            </div>

            <!-- Current Weather Tab -->
            <div id="current" class="tab-content active">
                <div class="weather-main">
                    <div class="weather-left">
                        <div class="city-name" id="cityName"></div>
                        <div class="city-date" id="cityDate"></div>
                        <div class="weather-icon" id="weatherIcon"></div>
                        <div class="temperature" id="temperature"></div>
                        <div class="weather-description" id="description"></div>
                    </div>
                    <div class="weather-right">
                        <div class="detail-item">
                            <div class="detail-label" id="feelsLikeLabel">Feels Like</div>
                            <div class="detail-value" id="feelsLike"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="humidityLabel">Humidity</div>
                            <div class="detail-value" id="humidity"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="windSpeedLabel">Wind Speed</div>
                            <div class="detail-value" id="windSpeed"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="pressureLabel">Pressure</div>
                            <div class="detail-value" id="pressure"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="visibilityLabel">Visibility</div>
                            <div class="detail-value" id="visibility"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="cloudCoverLabel">Cloud Cover</div>
                            <div class="detail-value" id="cloudCover"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="uvIndexLabel">UV Index</div>
                            <div class="detail-value" id="uvIndex"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="sunriseLabel">Sunrise</div>
                            <div class="detail-value" id="sunrise"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="sunsetLabel">Sunset</div>
                            <div class="detail-value" id="sunset"></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label" id="dewPointLabel">Dew Point</div>
                            <div class="detail-value" id="dewPoint"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Forecast Tab -->
            <div id="forecast" class="tab-content">
                <div id="forecastList" class="forecast-container"></div>
            </div>

            <!-- Air Quality Tab -->
            <div id="airquality" class="tab-content">
                <div id="airQualityContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                appTitle: 'Weather App',
                search: 'Search',
                myLocation: '📍 My Location',
                current: 'Current',
                forecast: '5-Day Forecast',
                airquality: 'Air Quality',
                feelsLike: 'Feels Like',
                humidity: 'Humidity',
                windSpeed: 'Wind Speed',
                pressure: 'Pressure',
                visibility: 'Visibility',
                cloudCover: 'Cloud Cover',
                uvIndex: 'UV Index',
                sunrise: 'Sunrise',
                sunset: 'Sunset',
                dewPoint: 'Dew Point',
                loading: 'Loading...',
                error: 'Error',
                cityNotFound: 'City not found',
                errorFetching: 'Error fetching weather data',
                enterCity: 'Please enter a city name',
                apiError: 'API key not configured',
                airQuality: 'Air Quality',
                aqi: 'AQI',
                pm25: 'PM2.5',
                pm10: 'PM10',
                no2: 'NO₂',
                o3: 'O₃',
                so2: 'SO₂',
                co: 'CO',
                excellent: 'Excellent',
                good: 'Good',
                moderate: 'Moderate',
                poor: 'Poor',
                veryPoor: 'Very Poor',
                locationError: 'Unable to get your location',
                locationDenied: 'Location permission denied',
                units: {
                    temp: '°C',
                    speed: 'm/s',
                    distance: 'km',
                    pressure: 'hPa'
                }
            },
            my: {
                appTitle: ' weather အက်ပ်',
                search: 'ရှာဖွေ',
                myLocation: '📍 ကျွန်ုပ်၏တည်နေရာ',
                current: 'လက်ရှိ',
                forecast: '5-နေ့ခန့်တွက်ဆ',
                airquality: 'လေအရည်အသွေး',
                feelsLike: 'ခံစားရသည့်အပူချိန်',
                humidity: 'စိုထိုင်းဆ',
                windSpeed: 'လေအလျင်',
                pressure: 'အဖိအား',
                visibility: 'မြင်ကွင်း',
                cloudCover: 'မုံးအုပ်',
                uvIndex: 'UV အညွှန်း',
                sunrise: 'နေထွက်သည့်အချိန်',
                sunset: 'နေအိမ်သည့်အချိန်',
                dewPoint: 'စ露အမှတ်',
                loading: 'ခုခံ...',
                error: 'အမှားအယွင်း',
                cityNotFound: 'မြို့မတွေ့ရှိ',
                errorFetching: 'weather ဒေတာ ရယူရာတွင်အမှားအယွင်း',
                enterCity: 'မြို့ အမည်ထည့်သွင်းပါ',
                apiError: 'API key ကို အဆင့်သတ်မှတ်ထားခြင်းမရှိ',
                airQuality: 'လေအရည်အသွေး',
                aqi: 'AQI',
                pm25: 'PM2.5',
                pm10: 'PM10',
                no2: 'NO₂',
                o3: 'O₃',
                so2: 'SO₂',
                co: 'CO',
                excellent: 'အလွန်ကောင်း',
                good: 'ကောင်း',
                moderate: 'အလယ်အလတ်',
                poor: 'အားနည်း',
                veryPoor: 'အလွန်အားနည်း',
                locationError: 'သင်၏တည်နေရာ ရယူမရခြင်း',
                locationDenied: 'တည်နေရာ ခွင့်ပြုချက် ငြင်းဆန်းခြင်း',
                units: {
                    temp: '°C',
                    speed: 'm/s',
                    distance: 'km',
                    pressure: 'hPa'
                }
            }
        };

        // Configuration
        const API_KEY = 'YOUR_API_KEY_HERE'; // Get from openweathermap.org
        const WEATHER_BASE_URL = 'https://api.openweathermap.org/data/2.5';
        const AQI_BASE_URL = 'https://api.openweathermap.org/data/2.5/air_pollution';
        const FORECAST_BASE_URL = 'https://api.openweathermap.org/data/2.5/forecast';

        let currentLanguage = 'en';
        let currentWeatherData = null;
        let currentCoords = null;

        // Weather icon mapping
        const iconMap = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌤️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // AQI Color mapping
        function getAQIColor(aqi) {
            if (aqi <= 1) return 'aqi-excellent';
            if (aqi <= 2) return 'aqi-good';
            if (aqi <= 3) return 'aqi-moderate';
            if (aqi <= 4) return 'aqi-poor';
            return 'aqi-very-poor';
        }

        function getAQIStatus(aqi) {
            const statuses = {
                1: 'excellent',
                2: 'good',
                3: 'moderate',
                4: 'poor',
                5: 'veryPoor'
            };
            return translations[currentLanguage][statuses[aqi] || 'good'];
        }

        // Utility Functions
        function t(key) {
            const keys = key.split('.');
            let value = translations[currentLanguage];
            for (let k of keys) {
                value = value[k];
            }
            return value;
        }

        function changeLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateUILanguage();
            if (currentWeatherData) {
                displayWeather(currentWeatherData);
            }
        }

        function updateUILanguage() {
            document.getElementById('appTitle').textContent = t('appTitle');
            document.getElementById('searchBtn').textContent = t('search');
            document.getElementById('geoBtn').textContent = t('myLocation');
            document.getElementById('currentTabLabel').textContent = t('current');
            document.getElementById('forecastTabLabel').textContent = t('forecast');
            document.getElementById('airqualityTabLabel').textContent = t('airquality');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');

            if (tabName === 'forecast') {
                loadForecast();
            } else if (tabName === 'airquality') {
                loadAirQuality();
            }
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError(t('enterCity'));
                return;
            }
            if (!API_KEY || API_KEY === 'f572fbe453212db1b57779fd6630bdc4') {
                showError(t('apiError'));
                return;
            }
            await fetchWeather(city);
        }

        async function getGeolocation() {
            showLoading(true);
            if (!navigator.geolocation) {
                showError(t('locationError'));
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    currentCoords = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    await fetchWeatherByCoords(currentCoords.lat, currentCoords.lon);
                },
                (error) => {
                    showError(t('locationDenied'));
                    showLoading(false);
                }
            );
        }

        async function fetchWeatherByCoords(lat, lon) {
            try {
                showLoading(true);
                hideError();

                const url = `${WEATHER_BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
                const response = await fetch(url);

                if (!response.ok) throw new Error('Weather data fetch failed');

                const data = await response.json();
                currentWeatherData = data;
                currentCoords = { lat, lon };
                displayWeather(data);
                showLoading(false);
            } catch (err) {
                showError('Error: ' + err.message);
                showLoading(false);
            }
        }

        async function fetchWeather(city) {
            try {
                showLoading(true);
                hideError();

                const url = `${WEATHER_BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`;
                const response = await fetch(url);

                if (!response.ok) {
                    if (response.status === 404) {
                        showError(t('cityNotFound'));
                    } else {
                        showError(t('errorFetching'));
                    }
                    showLoading(false);
                    return;
                }

                const data = await response.json();
                currentWeatherData = data;
                currentCoords = { lat: data.coord.lat, lon: data.coord.lon };
                displayWeather(data);
                showLoading(false);
            } catch (err) {
                showError('Error: ' + err.message);
                showLoading(false);
            }
        }

        function displayWeather(data) {
            const { main, weather, wind, clouds, sys, visibility, coord } = data;
            const icon = iconMap[weather[0].icon] || '🌤️';
            const date = new Date();

            document.getElementById('cityName').textContent = 
                `${data.name}, ${data.sys.country}`;
            document.getElementById('cityDate').textContent = 
                date.toLocaleDateString(currentLanguage === 'my' ? 'my-MM' : 'en-US');
            document.getElementById('weatherIcon').textContent = icon;
            document.getElementById('temperature').textContent = 
                `${Math.round(main.temp)}${t('units.temp')}`;
            document.getElementById('description').textContent = 
                weather[0].description;
            document.getElementById('feelsLike').textContent = 
                `${Math.round(main.feels_like)}${t('units.temp')}`;
            document.getElementById('humidity').textContent = 
                `${main.humidity}%`;
            document.getElementById('windSpeed').textContent = 
                `${wind.speed} ${t('units.speed')}`;
            document.getElementById('pressure').textContent = 
                `${main.pressure} ${t('units.pressure')}`;
            document.getElementById('visibility').textContent = 
                `${(visibility / 1000).toFixed(1)} ${t('units.distance')}`;
            document.getElementById('cloudCover').textContent = 
                `${clouds.all}%`;
            document.getElementById('uvIndex').textContent = 
                main.temp > 20 ? 'High' : 'Low';
            document.getElementById('sunrise').textContent = 
                new Date(sys.sunrise * 1000).toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('sunset').textContent = 
                new Date(sys.sunset * 1000).toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('dewPoint').textContent = 
                `${calculateDewPoint(main.temp, main.humidity).toFixed(1)}${t('units.temp')}`;

            document.getElementById('weatherInfo').classList.add('show');
        }

        function calculateDewPoint(temp, humidity) {
            const a = 17.27;
            const b = 237.7;
            const alpha = ((a * temp) / (b + temp)) + Math.log(humidity / 100);
            return (b * alpha) / (a - alpha);
        }

        async function loadForecast() {
            if (!currentCoords) return;

            try {
                const url = `${FORECAST_BASE_URL}?lat=${currentCoords.lat}&lon=${currentCoords.lon}&appid=${API_KEY}&units=metric`;
                const response = await fetch(url);
                const data = await response.json();

                const forecastList = document.getElementById('forecastList');
                forecastList.innerHTML = '';

                // Get 5-day forecast (one item per day at noon)
                const dailyForecasts = {};
                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000).toLocaleDateString();
                    if (!dailyForecasts[date]) {
                        dailyForecasts[date] = item;
                    }
                });

                Object.values(dailyForecasts).slice(0, 5).forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const icon = iconMap[item.weather[0].icon] || '🌤️';
                    
                    const forecastItem = document.createElement('div');
                    forecastItem.className = 'forecast-item';
                    forecastItem.innerHTML = `
                        <div class="forecast-time">${date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'})}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${Math.round(item.main.temp)}${t('units.temp')}</div>
                        <div class="forecast-desc">${item.weather[0].description}</div>
                    `;
                    forecastList.appendChild(forecastItem);
                });
            } catch (err) {
                console.error('Forecast error:', err);
            }
        }

        async function loadAirQuality() {
            if (!currentCoords) return;

            try {
                const url = `${AQI_BASE_URL}?lat=${currentCoords.lat}&lon=${currentCoords.lon}&appid=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                displayAirQuality(data.list[0]);

                console.error('Air quality error:', err);
                document.getElementById('airQualityContent').innerHTML = 
                    `<p>${t('error')}: ${err.message}</p>`;

        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
                document.getElementById('weatherInfo').classList.remove('show');
